name: Publish VS Code Extension

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          NEW_VERSION=$(npm version ${{ github.event.inputs.version_bump }} --no-git-tag-version)
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "version_plain=${NEW_VERSION#v}" >> $GITHUB_OUTPUT

      - name: Get last tag
        id: last_tag
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=${LAST_TAG}" >> $GITHUB_OUTPUT

      - name: Build changelog entry
        id: changelog
        run: |
          VERSION=${{ steps.bump.outputs.version_plain }}
          LAST_TAG=${{ steps.last_tag.outputs.tag }}

          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          fi

          # Build the new changelog block
          NEW_ENTRY="## [${VERSION}]"$'\n\n'"${COMMITS}"

          # Prepend after the first line (the # title)
          TITLE=$(head -1 CHANGELOG.md)
          REST=$(tail -n +2 CHANGELOG.md)
          printf '%s\n\n%s\n%s\n' "$TITLE" "$NEW_ENTRY" "$REST" > CHANGELOG.md

          # Store release notes for GitHub release (multiline-safe)
          {
            echo "notes<<EOF"
            echo "$COMMITS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Install vsce and ovsx
        run: pnpm install -g @vscode/vsce ovsx

      - name: Package extension
        run: pnpm run package

      - name: Commit changelog and version bump
        run: |
          git add CHANGELOG.md package.json
          git commit -m "Release ${{ steps.bump.outputs.version }}"

      - name: Create and push tag (if missing)
        id: tag
        run: |
          TAG=${{ steps.bump.outputs.version }}

          # Prevent reruns from failing if a previous run already created the tag.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null 2>&1 \
            || git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists. Skipping tag creation."
            echo "created=false" >> $GITHUB_OUTPUT
          else
            git tag "${TAG}"
            git push origin master
            git push origin "${TAG}"
            echo "created=true" >> $GITHUB_OUTPUT
          fi

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.bump.outputs.version }}

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" *.vsix --clobber
            gh release edit "${TAG}" \
              --title "${TAG}" \
              --notes "${{ steps.changelog.outputs.notes }}"
          else
            gh release create "${TAG}" *.vsix \
              --title "${TAG}" \
              --notes "${{ steps.changelog.outputs.notes }}"
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure identity
        run: |
          az account show
          az rest \
            --method GET \
            --url "https://app.vssps.visualstudio.com/_apis/profile/profiles/me?api-version=7.1-preview.3" \
            --resource 499b84ac-1321-427f-aa17-267ca6975798
      - name: Publish to VS Code Marketplace
        run: vsce publish --azure-credential --no-dependencies --packagePath *.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: ovsx publish *.vsix --pat $OVSX_PAT
